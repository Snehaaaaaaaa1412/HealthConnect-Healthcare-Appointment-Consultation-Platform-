version: '3.8'

services:
  ocr_service:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    container_name: hc_ocr_service
    ports:
      - "5001:5001"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hc_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_PATH=/app/data/info.db
      - JWT_SECRET=hc_production_jwt_sec_10928
      - EMAIL_USER=healthconnect.doctor@gmail.com
      - EMAIL_APP_PASSWORD=hc_app_pass_placeholder
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=http://localhost:5000
        - REACT_APP_OCR_BASE_URL=http://localhost:5001
    container_name: hc_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ocr_service
    restart: always

volumes:
  backend_data:
  backend_uploads:
